<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Online Flashcards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

  <div class="d-flex flex-column justify-content-center align-items-center vh-100">
    <h1 id="current_phrase">Click on Next to start</h1>
    <button id="next_button" class="btn btn-primary mt-2">Next</button>

    <h1 id="exam_results"></h1>

    <div class="d-flex flex-row justify-content-center align-items-center mt-4">
      <button id="correct_score" class="btn btn-success mx-2">0</button>
      <button id="add_correct" class="btn btn-success mx-2">Correct</button>
      
      <button id="countdown" class="btn btn-dark mx-2">22</button>

      <button id="add_incorrect" class="btn btn-danger mx-2">Incorrect</button>
      <button id="incorrect_score" class="btn btn-danger mx-2">0</button>
    </div>

    <div class="d-flex flex-row justify-content-center align-items-center mt-4">
      <button id="reset_score" class="btn btn-dark mx-2">Reset Score</button>
    </div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="main.js"></script>
  <script src="score.js"></script>
</body>

</html>
